<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creed — Signing you in…</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Rajdhani:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --e1:#00ff88; --bg0:#060b07; --bg1:#0a110b;
      --border:rgba(0,255,136,0.15); --border-hi:rgba(0,255,136,0.35);
      --text:#e8f5ec; --text-2:rgba(232,245,236,0.6); --text-3:rgba(232,245,236,0.35);
      --red:#ff4d6a; --blue:#5865f2;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Space Grotesk',sans-serif;
      background:var(--bg0); color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .box {
      background:var(--bg1); border:1px solid var(--border-hi);
      border-radius:24px; padding:48px 40px; width:min(440px,94vw);
      text-align:center; box-shadow:0 0 80px rgba(0,255,136,0.08);
    }
    .logo-name { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--e1); letter-spacing:3px; margin-top:8px; }
    h2 { font-size:20px; font-weight:700; margin:20px 0 8px; }
    p  { font-size:14px; color:var(--text-2); line-height:1.6; }
    .spinner {
      width:48px; height:48px; border:3px solid var(--border);
      border-top-color:var(--e1); border-radius:50%;
      animation:spin 0.8s linear infinite; margin:24px auto;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status-icon { font-size:52px; margin:16px 0; }
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 24px; border-radius:10px; font-family:'Space Grotesk',sans-serif;
      font-size:14px; font-weight:600; cursor:pointer; text-decoration:none;
      margin-top:20px; border:1px solid var(--border-hi); color:var(--text-2);
      background:transparent; transition:all 0.15s;
    }
    .btn:hover { color:var(--text); background:rgba(255,255,255,0.05); }
    .btn-primary { background:var(--e1); color:var(--bg0); border-color:var(--e1); }
    .btn-primary:hover { background:#1affaa; }
    .notice {
      font-size:12px; color:var(--text-3); margin-top:20px;
      background:rgba(0,255,136,0.04); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px; text-align:left; line-height:1.7;
    }
    .notice strong { color:var(--text-2); }
    code { background:rgba(0,255,136,0.1); padding:2px 6px; border-radius:4px; font-size:11px; color:var(--e1); }
  </style>
</head>
<body>
<div class="box" id="box">
  <!-- Logo -->
  <svg viewBox="0 0 56 56" fill="none" width="48" height="48">
    <polygon points="28,3 52,16 52,40 28,53 4,40 4,16" fill="rgba(0,255,136,0.07)" stroke="#00ff88" stroke-width="1.4"/>
    <text x="28" y="34" text-anchor="middle" font-family="Rajdhani" font-size="15" font-weight="700" fill="#00ff88">C</text>
  </svg>
  <div class="logo-name">CREED</div>

  <div class="spinner" id="spinner"></div>
  <h2 id="title">Connecting your account…</h2>
  <p id="sub">Please wait while we verify with Discord.</p>
</div>

<script>
// ════════════════════════════════════════════════════════
//  auth-callback.html
//
//  Discord sends the user here with ?code=XXX after they approve.
//  Because this is a pure frontend site (no server), we can't
//  exchange the code for a token ourselves (that requires the
//  Client Secret, which must never be in browser code).
//
//  What this page does instead:
//  1. Detects if Discord returned a code or an error
//  2. Shows the user a clear message
//  3. If a code arrived, saves a "pending login" flag and
//     shows instructions — OR, if you deploy the backend,
//     automatically completes the exchange there.
// ════════════════════════════════════════════════════════

const OWNER_ID = '1308499431666094124';

function setUI(icon, title, sub, extraHTML = '') {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = title;
  document.getElementById('sub').textContent   = sub;
  const box = document.getElementById('box');

  // insert icon before title
  const iconEl = document.createElement('div');
  iconEl.className = 'status-icon';
  iconEl.textContent = icon;
  document.getElementById('title').before(iconEl);

  if (extraHTML) {
    const extra = document.createElement('div');
    extra.innerHTML = extraHTML;
    box.appendChild(extra);
  }
}

function run() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  // ── User denied access ──
  if (error || params.get('error_description')) {
    setUI('❌', 'Access Cancelled',
      'You didn\'t authorise Creed Bot. No data was collected.',
      `<a href="../index.html" class="btn">← Back to Home</a>`
    );
    return;
  }

  // ── No code at all ──
  if (!code) {
    setUI('⚠️', 'Nothing to do here',
      'This page is the Discord login callback. Use the Login button on the home page to get here.',
      `<a href="../index.html" class="btn">← Home</a>`
    );
    return;
  }

  // ── Code received! ──
  // Store it so the dashboard can pick it up (demo mode)
  // In production your backend handles this automatically.
  sessionStorage.setItem('discord_code', code);

  // Check if a backend is running on the same origin
  fetch('/auth/callback?code=' + encodeURIComponent(code) + '&state=frontend')
    .then(res => {
      if (res.ok || res.redirected) {
        // Backend handled it — follow the redirect
        window.location.href = res.url || '/pages/dashboard.html';
      } else {
        showFrontendSuccess(code);
      }
    })
    .catch(() => {
      // No backend — show frontend-only success
      showFrontendSuccess(code);
    });
}

function showFrontendSuccess(code) {
  // Save a simulated user so the dashboard shows something
  // In production the backend returns the real Discord user object
  const simulatedUser = {
    id:         OWNER_ID,   // replace with real ID from backend response
    username:   'You',
    globalName: 'Discord User',
    avatar:     'https://cdn.discordapp.com/embed/avatars/0.png',
    isOwner:    true,        // set by backend based on actual ID
    loggedInAt: new Date().toISOString()
  };
  localStorage.setItem('creed_user', JSON.stringify(simulatedUser));

  setUI('✅', 'Discord Connected!',
    'Your account has been verified. Redirecting you now…',
    `
    <a href="dashboard.html" class="btn btn-primary" style="margin-right:8px;">Go to Dashboard →</a>
    <div class="notice">
      <strong>Note:</strong> You're seeing a demo login because this site is running as
      static HTML files without a backend server.<br/><br/>
      To get your <em>real</em> Discord profile loaded, deploy the
      <code>creed-oauth</code> Node.js backend from the OAuth2 zip —
      it exchanges the code Discord sent (<code>${code.slice(0,12)}…</code>)
      for your actual account details automatically.
    </div>
    `
  );

  // Auto-redirect after 3 seconds
  setTimeout(() => window.location.href = 'dashboard.html', 3000);
}

run();
</script>
</body>
</html>
