<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creed — Signing you in…</title>
  <style>
    :root {
      --e1:#00ff88;--bg0:#060b07;--bg1:#0a110b;
      --border:rgba(0,255,136,0.15);--border-hi:rgba(0,255,136,0.35);
      --text:#e8f5ec;--text-2:rgba(232,245,236,0.6);--text-3:rgba(232,245,236,0.35);
      --red:#ff4d6a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .box{background:var(--bg1);border:1px solid var(--border-hi);border-radius:24px;padding:48px 40px;width:min(460px,94vw);text-align:center;box-shadow:0 0 80px rgba(0,255,136,0.08);}
    .logo-name{font-size:22px;font-weight:700;color:var(--e1);letter-spacing:3px;margin-top:8px;}
    h2{font-size:20px;font-weight:700;margin:16px 0 8px;}
    p{font-size:14px;color:var(--text-2);line-height:1.6;}
    .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--e1);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .icon{font-size:52px;margin:16px 0;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:20px;border:1px solid var(--border-hi);color:var(--text-2);background:transparent;}
    .notice{font-size:12px;color:var(--text-3);margin-top:20px;background:rgba(0,255,136,0.04);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:left;line-height:1.8;}
    .notice strong{color:var(--text-2);}
    code{background:rgba(0,255,136,0.1);padding:1px 6px;border-radius:4px;font-size:11px;color:var(--e1);}
    .uri-box{background:var(--bg0);border:1px solid var(--border-hi);border-radius:8px;padding:10px 14px;font-family:monospace;font-size:12px;color:var(--e1);word-break:break-all;margin:10px 0;text-align:left;}
    .step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;color:var(--text-2);}
    .step-num{background:var(--e1);color:var(--bg0);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;margin-top:1px;}
  </style>
</head>
<body>
<div class="box" id="box">
  <svg viewBox="0 0 56 56" fill="none" width="44" height="44">
    <polygon points="28,3 52,16 52,40 28,53 4,40 4,16" fill="rgba(0,255,136,0.07)" stroke="#00ff88" stroke-width="1.4"/>
    <text x="28" y="34" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#00ff88">C</text>
  </svg>
  <div class="logo-name">CREED</div>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Signing you in…</h2>
  <p id="sub">Connecting to Discord…</p>
  <div id="extra"></div>
</div>

<script>
const OWNER_DISCORD_ID = '1308499431666094124';
const CLIENT_ID = '1519043591916490948';
const AUTH_TIMEOUT_MS = 12000;

function isOwner(user) {
  if (!user) return false;
  return String(user.id || '') === OWNER_DISCORD_ID;
}

function setStatus(text) {
  const sub = document.getElementById('sub');
  if (sub) sub.textContent = text;
}

function done(icon, title, sub, extraHTML) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = title;
  document.getElementById('sub').textContent = sub;
  const iconEl = document.createElement('div');
  iconEl.className = 'icon';
  iconEl.textContent = icon;
  document.getElementById('title').before(iconEl);
  if (extraHTML) document.getElementById('extra').innerHTML = extraHTML;
}

function finishLogin(user) {
  const profileImage = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
    : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || '0', 10) % 5}.png`;

  localStorage.setItem('creed_user', JSON.stringify({
    id: String(user.id),
    username: user.username,
    discriminator: user.discriminator,
    avatarUrl: profileImage,
    role: isOwner(user) ? 'owner' : 'member',
    adminToken: user.adminToken || null,
    serverRole: 'Member',
    lastLoginAt: new Date().toISOString(),
    loggedInAt: new Date().toISOString()
  }));

  setStatus('Success! Redirecting…');
  const returnTo = sessionStorage.getItem('creed_return_to');
  sessionStorage.removeItem('creed_return_to');
  window.location.replace(returnTo || '/index.html');
}

async function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    return await fetch(url, { signal: controller.signal, cache: 'no-store' });
  } finally {
    clearTimeout(timer);
  }
}

async function run() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    done('❌', 'Cancelled', 'You didn\'t authorise Creed. No data was collected.',
      `<a href="/index.html" class="btn">← Back to Home</a>`);
    return;
  }

  if (!code) {
    done('⚠️', 'Nothing here', 'Use the Login button on the home page.',
      `<a href="/index.html" class="btn">← Home</a>`);
    return;
  }

  let backendError = null;

  try {
    setStatus('Verifying with Discord…');
    const backendRes = await fetchWithTimeout('/auth/callback?code=' + encodeURIComponent(code), AUTH_TIMEOUT_MS);

    if (backendRes.ok) {
      const user = await backendRes.json();
      finishLogin(user);
      return;
    }

    try {
      const errorJson = await backendRes.json();
      backendError = typeof errorJson.error === 'string' ? errorJson.error : JSON.stringify(errorJson);
    } catch (_) {
      backendError = await backendRes.text();
    }
  } catch (e) {
    backendError = e.name === 'AbortError'
      ? 'Login timed out. Check your connection and try again.'
      : e.message;
  }

  const currentURI = window.location.href.split('?')[0];

  done('⚠️', 'Login failed', 'Could not complete Discord sign-in.',
    `
    <div class="notice">
      <strong>Callback URL for Discord Portal:</strong>
      <div class="uri-box">${currentURI}</div>
      <div class="step"><span class="step-num">1</span><span>Add the URL above under <a href="https://discord.com/developers/applications/${CLIENT_ID}/oauth2/general" target="_blank" style="color:var(--e1)">Discord OAuth2 → Redirects</a></span></div>
      <div class="step"><span class="step-num">2</span><span>Ensure <code>DISCORD_CLIENT_SECRET</code> is set in Vercel env vars</span></div>
      <div class="step"><span class="step-num">3</span><span>Retry login from the home page</span></div>
    </div>
    ${backendError ? `<div class="notice" style="margin-top:16px;border-color:rgba(255,77,106,0.35);background:rgba(255,77,106,0.08);"><strong>Error:</strong> ${backendError}</div>` : ''}
    <a href="/index.html" class="btn">← Back to Home</a>
    `
  );
}

run();
</script>
</body>
</html>
